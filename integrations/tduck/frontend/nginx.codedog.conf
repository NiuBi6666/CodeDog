map $request_uri $codedog_access_loggable {
    default 1;
    ~^/tduck-api/codedog/sso 0;
}

server {
    access_log /var/log/nginx/access.log combined if=$codedog_access_loggable;
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 100m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "frame-ancestors https://codedog.online https://www.codedog.online https://124.222.122.230" always;

    location /tduck-api/ {
        proxy_pass http://backend:8999/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /upload/ {
        proxy_pass http://backend:8999/upload/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        expires 7d;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }
}
