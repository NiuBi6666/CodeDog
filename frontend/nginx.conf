server {
    listen 443 ssl;
    http2 on;
    server_name www.codedog.online;
    client_max_body_size 24m;

    ssl_certificate /etc/letsencrypt/live/codedog.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/codedog.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Content-Security-Policy "frame-ancestors https://codedog.online https://www.codedog.online https://124.222.122.230" always;

    location = / {
        return 302 https://codedog.online/index;
    }

    location / {
        proxy_pass https://forms_proxy;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_ssl_verify off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
