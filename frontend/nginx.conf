server {
    listen 443 ssl default_server;
    http2 on;
    server_name 124.222.122.230;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 12m;

    ssl_certificate /etc/letsencrypt/live/124.222.122.230/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/124.222.122.230/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; object-src 'none'; frame-src https://www.codedog.online; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" always;

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 65s;
    }

    location = /healthz {
        proxy_pass http://backend:8080/actuator/health;
        proxy_set_header Host $host;
    }

    location = / {
        return 302 /index;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }
}

